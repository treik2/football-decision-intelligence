version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fdi_api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/football_di
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ODDS_API_KEY=${ODDS_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - MODEL_DIR=/app/backend/ml/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fdi_net

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fdi_worker
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/football_di
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ODDS_API_KEY=${ODDS_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - MODEL_DIR=/app/backend/ml/artifacts
    depends_on:
      - db
      - redis
    networks:
      - fdi_net

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fdi_beat
    command: celery -A backend.workers.celery_app beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/football_di
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
    networks:
      - fdi_net

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: fdi_db
    environment:
      POSTGRES_DB: football_di
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fdi_net

  redis:
    image: redis:7-alpine
    container_name: fdi_redis
    ports:
      - "6379:6379"
    networks:
      - fdi_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fdi_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - fdi_net

  flower:
    image: mher/flower:2.0
    container_name: fdi_flower
    command: celery flower --broker=redis://redis:6379/1 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - fdi_net

volumes:
  pgdata:

networks:
  fdi_net:
    driver: bridge
